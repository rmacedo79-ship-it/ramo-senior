<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ramo Sênior — Atualização do Programa Educativo</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d2b1a">

<style>
  /* Mantenha todo o seu CSS original aqui */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0f0d;
    font-family: 'Georgia', 'Times New Roman', serif;
    color: #e8e0d0;
  }
  /* ... resto do seu CSS ... */
</style>
</head>
<body>

<script>
  // REGISTRO DO SERVICE WORKER
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(reg => console.log('Sincronização offline ativa!'))
        .catch(err => console.error('Erro de registro:', err));
    });
  }

  // Suas funções de navegação originais
  function showSection(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (btn) btn.classList.add('active');
  }
</script>
</body>
</html>
</body>
</html>
